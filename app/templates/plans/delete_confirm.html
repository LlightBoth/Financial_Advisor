{% extends "layouts/clientBase.html" %}
{% block title %} Delete Plan {% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h3 class="h4 text-danger"> Confirm Delete </h3>
        <p class="mt-3"> Are you sure you want to delete this Plan? </p>

        <form method="post" action="{{ url_for('plans.delete', plan_id=plan.id) }}">
            {{ form.hidden_tag() }}
            {{ form.submit(class="btn btn-danger") }}
            <a href="{{ url_for('plans.index') }}" class="btn btn-danger"> Cancel </a>
        </form>
        
    </div>
</div>

{% endblock %}
